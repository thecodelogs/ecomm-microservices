syntax = "proto3";

package product;

option go_package = "github.com/manojnegi/ecomm-microservices/gen/go/product/v1;productpb";

service ProductService {
    rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
    rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
    rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
    rpc GetProduct(GetProductRequest) returns (GetProductResponse);
    rpc ListProducts(ListProductsRequest) returns (ProductListResponse);

    rpc CreateVariant(CreateVariantRequest) returns (CreateVariantResponse);
    rpc UpdateVariant(UpdateVariantRequest) returns (UpdateVariantResponse);
    rpc DeleteVariant(DeleteVariantRequest) returns (DeleteVariantResponse);
}

service CategoryService {
    rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
    rpc UpdateCategory(UpdateCategoryRequest) returns (UpdateCategoryResponse);
    rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse);
    rpc GetCategory(GetCategoryRequest) returns (GetCategoryResponse);
    rpc ListCategories(ListCategoryRequest) returns (CategoryListResponse);
}

service InventoryService {
    rpc GetInventory(GetInventoryRequest) returns (GetInventoryResponse);
}

message Category {
    string id = 1;
    string name = 2;
    string description = 3;
    string slug = 4;
    string image_url = 5;
    int32 sort_order = 6;
    bool is_active = 7;
    string parent_id = 8;
}

message CreateCategoryRequest {
    string name = 1;
    string description = 2;
    string slug = 3;
    string image_url = 4;
    int32 sort_order = 5;
    bool is_active = 6;
    string parent_id = 7;
}

message CreateCategoryResponse {
    string id = 1;
}

message GetCategoryRequest {
    string id = 1;
}

message GetCategoryResponse {
    Category category = 1;
}

message UpdateCategoryRequest {
    string id = 1;
    string name = 2;
    string description = 3;
    string slug = 4;
    string image_url = 5;
    int32 sort_order = 6;
    bool is_active = 7;
    string parent_id = 8;
}

message UpdateCategoryResponse {
    Category category = 1;
}

message DeleteCategoryRequest {
    string id = 1;
}

message DeleteCategoryResponse {
    bool success = 1;
}

message ListCategoryRequest {
    int32 page = 1;
    int32 page_size = 2;
}

message ListProductsRequest {
    int32 page = 1;
    int32 page_size = 2;
    string category_id = 3;
}

message CategoryListResponse {
    repeated Category category = 1;
    int32 total = 2;
    int32 page = 3;
}

// Ensure your response message name matches what the handler returns
message ProductListResponse {
    repeated Product products = 1;
    int32 total = 2;
    int32 page = 3;
}

message Product {
    string id = 1;
    string category_id = 2;
    string slug = 3;
    string name = 4;
    string description = 5;
    string brand = 6;
    string status = 7;
    string vendor_id = 8;
    double avg_rating = 9;
    int32 review_count = 10;
    int64 created_at = 11;
    repeated Variant variants = 12;
}

message Variant {
    string id = 1;
    string product_id = 2;
    string sku = 3;
    string name = 4;
    string options = 5;
    double price = 6;
    double compare_at_price = 7;
    double cost_price = 8;
    int32 weight_grams = 9;
    string image_url = 10;
    bool is_active = 11;
    int64 created_at = 12;
    int64 updated_at = 13;
}

message CreateVariantRequest {
    string product_id = 1;
    string sku = 2;
    string name = 3;
    string options = 4;
    double price = 5;
    double compare_at_price = 6;
    double cost_price = 7;
    int32 weight_grams = 8;
    string image_url = 9;
    bool is_active = 10;
}

message CreateVariantResponse {
    Variant variant = 1;
}

message UpdateVariantRequest {
    string id = 1;
    string product_id = 2;
    string sku = 3;
    string name = 4;
    string options = 5;
    double price = 6;
    double compare_at_price = 7;
    double cost_price = 8;
    int32 weight_grams = 9;
    string image_url = 10;
    bool is_active = 11;
}

message UpdateVariantResponse {
    Variant variant = 1;
}

message DeleteVariantRequest {
    string id = 1;
}

message DeleteVariantResponse {
    bool success = 1;
}

message CreateProductRequest {
    string category_id = 1;
    string name = 2;
    string description = 3;
	string slug = 4;
    string short_description = 5;
    string brand = 6;
    repeated string tags = 7;
	string attributes = 8;
	string status = 9;
	string vendor_id = 10;
}

message CreateProductResponse {
    string id = 1;
    Product product = 2;
}

message UpdateProductRequest {
    string id = 1;
    string category_id = 2;
    string name = 3;
    string description = 4;
	string slug = 5;
    string short_description = 6;
    string brand = 7;
    repeated string tags = 8;
	string attributes = 9;
	string status = 10;
    string vendor_id = 11;
}

message UpdateProductResponse {
    Product product = 1;
}

message DeleteProductRequest {
    string id = 1;
}

message DeleteProductResponse {
    bool success = 1;
}

message GetProductRequest {
    string id = 1;
}

message GetProductResponse {
    Product product = 1;
}

message GetInventoryRequest {
    string variant_id = 1;
}

message Inventory {
    string variant_id = 1;
    int32 quantity_on_hand = 2;
    int32 quantity_reserved = 3;
    int32 quantity_available = 4;
}

message GetInventoryResponse {
    Inventory inventory = 1;
}