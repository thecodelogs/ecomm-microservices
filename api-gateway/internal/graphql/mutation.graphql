type Mutation {
  # Auth
  register(input: RegisterInput!): AuthPayload!
  signin(input: SigninInput!): AuthPayload!
  adminLogin(input: SigninInput!): AuthPayload!
  refreshToken(token: String!): AuthPayload!
  logout: Boolean! @auth

  # User Profile
  updateProfile(input: UpdateProfileInput!): User! @auth

  # Addresses
  createAddress(input: AddressInput!): Address! @auth
  updateAddress(id: ID!, input: AddressInput!): Address! @auth
  deleteAddress(id: ID!): Boolean! @auth
  setDefaultAddress(id: ID!): Address! @auth

  # Admin - Users
  updateUserStatus(id: ID!, status: UserStatus!): User! @auth @admin
  deleteUser(id: ID!): Boolean! @auth @admin

  # Admin - Products
  createProduct(input: CreateProductInput!): Product! @auth @admin
  updateProduct(id: ID!, input: UpdateProductInput!): Product! @auth @admin
  deleteProduct(id: ID!): Boolean! @auth @admin
  createCategory(input: CreateCategoryInput!): Category! @auth @admin
  updateCategory(id: ID!, input: UpdateCategoryInput!): Category! @auth @admin
  deleteCategory(id: ID!): Boolean! @auth @admin

  createVariant(input: CreateVariantInput!): Variant! @auth @admin
  updateVariant(id: ID!, input: UpdateVariantInput!): Variant! @auth @admin
  deleteVariant(id: ID!): Boolean! @auth @admin

  # Admin - Inventory
  updateInventory(variantId: ID!, input: UpdateInventoryInput!): Inventory! @auth @admin

  # Images
  addVariantImage(variantId: ID!, url: String!, altText: String, sortOrder: Int): VariantImage! @auth @admin
  removeVariantImage(id: ID!): Boolean! @auth @admin
  reorderVariantImages(variantId: ID!, orders: [ImageOrderInput!]!): Boolean! @auth @admin
}

input ImageOrderInput {
  id: ID!
  sortOrder: Int!
}

input UpdateInventoryInput {
  quantityOnHand: Int!
  reorderPoint: Int!
}
