type Mutation {
  # Auth
  register(input: RegisterInput!): AuthPayload!
  signin(input: SigninInput!): AuthPayload!
  adminLogin(input: SigninInput!): AuthPayload!
  refreshToken(token: String!): AuthPayload!
  logout: Boolean! @auth

  # User Profile
  updateProfile(input: UpdateProfileInput!): User! @auth

  # Addresses
  createAddress(input: AddressInput!): Address! @auth
  updateAddress(id: ID!, input: AddressInput!): Address! @auth
  deleteAddress(id: ID!): Boolean! @auth
  setDefaultAddress(id: ID!): Address! @auth

  # Admin - Users
  updateUserStatus(id: ID!, status: UserStatus!): User! @auth @admin
  deleteUser(id: ID!): Boolean! @auth @admin

  # Admin - Products
  createProduct(input: CreateProductInput!): Product! @auth @admin
  createCategory(input: CreateCategoryInput!): Category! @auth @admin
  updateCategory(id: ID!, input: UpdateCategoryInput!): Category! @auth @admin
}
