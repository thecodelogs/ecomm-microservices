type Product implements Node {
  id: ID!
  name: String!
  description: String!
  price: Float!
  sku: String!
  stock: Int!
  category: Category!
  images: [String!]!
  variants: [Variant!]!
  createdAt: Time!
  updatedAt: Time!
}

type Variant implements Node {
  id: ID!
  productId: ID!
  sku: String!
  name: String!
  options: String
  price: Float!
  compareAtPrice: Float
  costPrice: Float
  weightGrams: Int!
  imageUrl: String
  isActive: Boolean!
  createdAt: Time!
  updatedAt: Time!
}

type Category implements Node {
  id: ID!
  name: String!
  slug: String!
  description: String
  imageUrl: String
  sortOrder: Int!
  isActive: Boolean!
  parentId: ID
  children: [Category!]!
  products: [Product!]!
}

type CategoryConnection {
  edges: [CategoryEdge!]!
  pageInfo: PageInfo!
}

type CategoryEdge {
  node: Category!
  cursor: String!
}

type ProductConnection {
  edges: [ProductEdge!]!
  pageInfo: PageInfo!
}

type ProductEdge {
  node: Product!
  cursor: String!
}

input CreateProductInput {
  name: String!
  description: String!
  price: Float!
  sku: String!
  stock: Int!
  categoryId: ID!
  image: Upload
  slug: String!
  shortDescription: String
  brand: String
  tags: [String!]
  attributes: String
  status: String
  vendorId: ID
}

input UpdateProductInput {
  name: String!
  description: String!
  price: Float!
  sku: String!
  stock: Int!
  categoryId: ID!
  image: Upload
  slug: String!
  shortDescription: String
  brand: String
  tags: [String!]
  attributes: String
  status: String
}

input CreateCategoryInput {
  name: String!
  slug: String!
  description: String
  parentId: ID
  SortOrder: Int!
  IsActive: Boolean!
  image: Upload
}

input UpdateCategoryInput {
  name: String!
  slug: String!
  description: String
  parentId: ID
  sortOrder: Int!
  isActive: Boolean!
  image: Upload
}

input CreateVariantInput {
  productId: ID!
  sku: String!
  name: String!
  options: String
  price: Float!
  compareAtPrice: Float
  costPrice: Float
  weightGrams: Int!
  image: Upload
  isActive: Boolean!
}

input UpdateVariantInput {
  productId: ID!
  sku: String!
