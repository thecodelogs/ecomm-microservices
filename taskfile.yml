version: "3"

dotenv: [".env"]

vars:
  DB_USER: "manojnegi"
  DB_PASS: "123456"
  DB_HOST: "localhost"
  DB_PORT: "5432"
  DB_SSLMODE: "disable"
  ORDER_DB_NAME: "ecomm-order-service"
  PRODUCT_DB_NAME: "ecomm-product-service"
  USER_DB_NAME: "ecomm-user-service"
  PAYMENT_DB_NAME: "ecomm-payment-service"

tasks:
  # ──────────────────────────────────────────────
  #  Proto Generation
  # ──────────────────────────────────────────────
  proto:gen:
    desc: Generate Go & Rust code from proto files using buf
    dir: proto
    cmds:
      - buf generate

  proto:lint:
    desc: Lint proto files
    dir: proto
    cmds:
      - buf lint

  proto:format:
    desc: Format proto files
    dir: proto
    cmds:
      - buf format -w

  # ──────────────────────────────────────────────
  #  Migrations — User Service
  # ──────────────────────────────────────────────

  migrate:up:
    desc: Run migrations for all services
    cmds:
      - task migrate:user:up
      - task migrate:product:up
      - task migrate:order:up

  migrate:drop:
    desc: Drop migrations for all services
    cmds:
      - task migrate:user:drop
      - task migrate:product:drop
      - task migrate:order:drop

  migrate:user:create:
    desc: "Create a new migration for user-service (usage: task migrate:user:create -- create_users_table)"
    cmds:
      - migrate create -ext sql -dir ./services/user-service/db/migrations -seq {{.CLI_ARGS}}

  migrate:user:up:
    desc: Run all up migrations for user-service
    cmds:
      - migrate -database "postgres://{{.DB_USER}}:{{.DB_PASS}}@{{.DB_HOST}}:{{.DB_PORT}}/{{.USER_DB_NAME}}?sslmode={{.DB_SSLMODE}}" -path ./services/user-service/db/migrations up

  migrate:user:drop:
    desc: Rollback the last migration for user-service
    cmds:
      - migrate -database "postgres://{{.DB_USER}}:{{.DB_PASS}}@{{.DB_HOST}}:{{.DB_PORT}}/{{.USER_DB_NAME}}?sslmode={{.DB_SSLMODE}}" -path ./services/user-service/db/migrations drop

  # ──────────────────────────────────────────────
  #  Migrations — Product Service
  # ──────────────────────────────────────────────
  migrate:product:create:
    desc: "Create a new migration for product-service (usage: task migrate:product:create -- create_products_table)"
    cmds:
      - migrate create -ext sql -dir ./services/product-service/db/migrations -seq {{.CLI_ARGS}}

  migrate:product:up:
    desc: Run all up migrations for product-service
    cmds:
      - migrate -database "postgres://{{.DB_USER}}:{{.DB_PASS}}@{{.DB_HOST}}:{{.DB_PORT}}/{{.PRODUCT_DB_NAME}}?sslmode={{.DB_SSLMODE}}" -path ./services/product-service/db/migrations up

  migrate:product:drop:
    desc: Rollback the last migration for product-service
    cmds:
      - migrate -database "postgres://{{.DB_USER}}:{{.DB_PASS}}@{{.DB_HOST}}:{{.DB_PORT}}/{{.PRODUCT_DB_NAME}}?sslmode={{.DB_SSLMODE}}" -path ./services/product-service/db/migrations down

  # ──────────────────────────────────────────────
  #  Migrations — Order Service
  # ──────────────────────────────────────────────
  migrate:order:create:
    desc: "Create a new migration for order-service (usage: task migrate:order:create -- create_orders_table)"
    cmds:
      - migrate create -ext sql -dir ./services/order-service/db/migrations -seq {{.CLI_ARGS}}

  migrate:order:up:
    desc: Run all up migrations for order-service
    cmds:
      - migrate -database "postgres://{{.DB_USER}}:{{.DB_PASS}}@{{.DB_HOST}}:{{.DB_PORT}}/{{.ORDER_DB_NAME}}?sslmode={{.DB_SSLMODE}}" -path ./services/order-service/db/migrations up

  migrate:order:drop:
    desc: Rollback the last migration for order-service
    cmds:
      - migrate -database "postgres://{{.DB_USER}}:{{.DB_PASS}}@{{.DB_HOST}}:{{.DB_PORT}}/{{.ORDER_DB_NAME}}?sslmode={{.DB_SSLMODE}}" -path ./services/order-service/db/migrations drop

  # ──────────────────────────────────────────────
  #  Migrations — Payment Service
  # ──────────────────────────────────────────────

  migrate:payment:up:
    desc: Run all up migrations for payment-service
    cmds:
      - migrate -database "postgres://{{.DB_USER}}:{{.DB_PASS}}@{{.DB_HOST}}:{{.DB_PORT}}/{{.PAYMENT_DB_NAME}}?sslmode={{.DB_SSLMODE}}" -path ./services/payment-service/db/migrations up

  migrate:payment:drop:
    desc: Rollback the last migration for payment-service
    cmds:
      - migrate -database "postgres://{{.DB_USER}}:{{.DB_PASS}}@{{.DB_HOST}}:{{.DB_PORT}}/{{.PAYMENT_DB_NAME}}?sslmode={{.DB_SSLMODE}}" -path ./services/payment-service/db/migrations drop

  # ──────────────────────────────────────────────
  #  Run Services
  # ──────────────────────────────────────────────
  run:user:
    desc: Run user-service locally
    dir: services/user-service
    cmds:
      - go run ./src/...

  run:product:
    desc: Run product-service locally
    dir: services/product-service
    cmds:
      - go run ./src/...

  run:order:
    desc: Run order-service locally
    dir: services/order-service
    cmds:
      - go run ./src/...

  run:payment:
    desc: Run payment-service locally (Rust)
    dir: services/payement-service
    cmds:
      - cargo run

  # ──────────────────────────────────────────────
  #  Build
  # ──────────────────────────────────────────────
  build:user:
    desc: Build user-service binary
    dir: services/user-service
    cmds:
      - go build -o bin/user-service ./src/...

  build:product:
    desc: Build product-service binary
    dir: services/product-service
    cmds:
      - go build -o bin/product-service ./src/...

  build:order:
    desc: Build order-service binary
    dir: services/order-service
    cmds:
      - go build -o bin/order-service ./src/...

  build:payment:
    desc: Build payment-service binary (Rust)
    dir: services/payement-service
    cmds:
      - cargo build --release

  build:all:
    desc: Build all services
    cmds:
      - task: build:user
      - task: build:product
      - task: build:order
      - task: build:payment

  # ──────────────────────────────────────────────
  #  Docker
  # ──────────────────────────────────────────────
  docker:up:
    desc: Start all containers with docker-compose
    cmds:
      - docker compose up -d

  docker:down:
    desc: Stop all containers
    cmds:
      - docker compose down

  docker:logs:
    desc: Tail docker-compose logs
    cmds:
      - docker compose logs -f

  docker:ps:
    desc: List running containers
    cmds:
      - docker compose ps

  # ──────────────────────────────────────────────
  #  Dev Utilities
  # ──────────────────────────────────────────────
  tidy:
    desc: Run go mod tidy on all services
    cmds:
      - cd services/user-service && go mod tidy
      - cd services/product-service && go mod tidy
      - cd services/order-service && go mod tidy

  vet:
    desc: Run go vet on all services
    cmds:
      - cd services/user-service && go vet ./...
      - cd services/product-service && go vet ./...
      - cd services/order-service && go vet ./...

  test:
    desc: Run tests for all services
    cmds:
      - cd services/user-service && go test ./...
      - cd services/product-service && go test ./...
      - cd services/order-service && go test ./...

  clean:
    desc: Remove all build artifacts
    cmds:
      - rm -rf services/user-service/bin
      - rm -rf services/product-service/bin
      - rm -rf services/order-service/bin
